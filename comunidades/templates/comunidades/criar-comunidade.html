{% extends 'base.html' %}
{% load static %}

{% block title %}
Criar Comunidade
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/comunidade.css' %}">
{% endblock %}

{% block content %}

<div class="config-container">
    <h2 class="config-title">Criar Nova Comunidade</h2>

    <div class="config-section">
        <form method="POST" action="{% url 'comunidades:create' %}" class="config-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="input-nome" class="form-label">Nome da Comunidade</label>
                <input type="text" id="input-nome" name="nome" class="form-input" placeholder="Nome da comunidade" required>
            </div>

            <div class="form-group">
                <label for="input-descricao" class="form-label">Descrição</label>
                <textarea id="input-descricao" name="descricao" rows="5" class="form-textarea" placeholder="Descrição da comunidade" required></textarea>
            </div>

            <div class="config-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-check"></i> Salvar
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
