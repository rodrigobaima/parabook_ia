<h1>Editar Comunidade</h1>

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="nome"
        value="{{ comunidade.nome }}"
        required
    >

    <br><br>

    <textarea
        name="descricao"
        required
    >{{ comunidade.descricao }}</textarea>

    <br><br>

    <button type="submit">
        Atualizar
    </button>

</form>
